<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Stars Adventure</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            text-align: center;
            padding: 20px;
            color: #2f3542;
            min-height: 100vh;
            margin: 0;
        }

        h1 { color: #ff4757; font-size: 2.8rem; margin: 10px 0; text-shadow: 2px 2px #fff; }
        
        .nav-container {
            margin: 20px auto;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            max-width: 1100px;
        }

        .level-btn {
            padding: 12px 20px;
            font-size: 1rem;
            border: 3px solid #1e90ff;
            border-radius: 50px;
            cursor: pointer;
            background: white;
            color: #1e90ff;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .level-btn:hover { transform: scale(1.1); background: #f1f9ff; }
        .level-btn.active { background: #1e90ff; color: white; box-shadow: 0 5px 15px rgba(30,144,255,0.4); }
        .level-btn.blend-mode.active { background: #ffa502; border-color: #ffa502; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 20px 140px 20px;
        }

        .card {
            background: white;
            border: 5px solid #1e90ff;
            border-radius: 25px;
            padding: 20px;
            cursor: pointer;
            position: relative;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 220px;
        }

        .card:hover { transform: translateY(-12px) rotate(3deg); border-color: #ffa502; }
        .card.active { border-color: #2ed573; background-color: #f0fff4; }

        .speaking-dot {
            display: none;
            position: absolute;
            top: 15px;
            right: 15px;
            width: 22px;
            height: 22px;
            background-color: #ff4757;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .blend-display { font-size: 4rem; letter-spacing: 15px; margin-bottom: 20px; font-weight: bold; }
        .char-active { color: #ffa502; transform: scale(1.4); display: inline-block; }

        .slider-container { width: 90%; margin-top: 15px; }
        input[type=range] { width: 100%; cursor: pointer; height: 35px; }

        .footer-score {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: white; padding: 15px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.08);
            font-size: 2.2rem; color: #ffa502; font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Reading Stars ⭐</h1>
    
    <div class="nav-container">
        <button class="level-btn active" onclick="loadLevel('l1', this)">L1</button>
        <button class="level-btn blend-mode" onclick="loadLevel('blend', this)">🌟 Blending</button>
    </div>

    <div id="game-grid" class="grid"></div>
    <div class="footer-score">Stars: <span id="star-count">0</span> 🌟</div>

    <script>
        const wordData = {
            l1: [{w:"ANT", l:"A"}, {w:"BAT", l:"B"}, {w:"CAT", l:"C"}, {w:"DOG", l:"D"}, {w:"EGG", l:"E"}],
            blend: [
                {w:"CAT", p:["cuh", "ah", "tuh"]}, 
                {w:"DOG", p:["duh", "aw", "guh"]}, 
                {w:"SUN", p:["suh", "uh", "nuh"]}, 
                {w:"MAP", p:["muh", "ah", "puh"]}, 
                {w:"TEN", p:["tuh", "eh", "nuh"]}
            ]
        };

        let stars = 0;

        function getBestVoice() {
            const voices = window.speechSynthesis.getVoices();
            return voices.find(v => v.name.includes('Google') && v.lang.includes('en-US')) || 
                   voices.find(v => v.lang.includes('en-US')) || voices[0];
        }

        function loadLevel(levelId, btn) {
            window.speechSynthesis.cancel();
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const grid = document.getElementById('game-grid');
            grid.innerHTML = ''; 

            wordData[levelId].forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                
                if(levelId === 'blend') {
                    const word = item.w;
                    const chars = word.split('');
                    let wordHtml = `<div class="blend-display">`;
                    chars.forEach((c, i) => wordHtml += `<span id="char-${word}-${i}">${c}</span>`);
                    wordHtml += `</div>`;
                    
                    card.innerHTML = `<div class="speaking-dot"></div>${wordHtml}<div class="slider-container"><input type="range" min="0" max="${chars.length + 1}" value="0" oninput="handleBlend(this, '${word}', this.parentElement.parentElement)"></div>`;
                    card.dataset.phonetics = JSON.stringify(item.p);
                } else {
                    card.innerHTML = `<div class="speaking-dot"></div><span class="letter-header">${item.l}${item.l.toLowerCase()}</span><span class="target-word">${item.w}</span>`;
                    card.onclick = () => speakWord(item.l.toLowerCase() + "... " + item.w.toLowerCase(), card);
                }
                grid.appendChild(card);
            });
        }

        function speakWord(text, card) {
            window.speechSynthesis.cancel();
            const dot = card.querySelector('.speaking-dot');
            dot.style.display = 'block';
            card.classList.add('active');
            
            const msg = new SpeechSynthesisUtterance(text);
            msg.voice = getBestVoice();
            msg.onend = () => {
                dot.style.display = 'none';
                card.classList.remove('active');
                stars++;
                document.getElementById('star-count').innerText = stars;
            };
            window.speechSynthesis.speak(msg);
        }

        function handleBlend(slider, word, card) {
            window.speechSynthesis.cancel();
            const val = parseInt(slider.value);
            const chars = word.split('');
            const dot = card.querySelector('.speaking-dot');
            const phonetics = JSON.parse(card.dataset.phonetics);
            
            chars.forEach((_, i) => document.getElementById(`char-${word}-${i}`).className = '');

            if (val > 0) {
                dot.style.display = 'block';
                let msg;

                if (val <= chars.length) {
                    const index = val - 1;
                    document.getElementById(`char-${word}-${index}`).className = 'char-active';
                    // Speak just the short sound (e.g., "cuh")
                    msg = new SpeechSynthesisUtterance(phonetics[index]);
                    msg.rate = 0.8;
                } else {
                    // Full word sweep
                    chars.forEach((_, i) => document.getElementById(`char-${word}-${i}`).className = 'char-active');
                    msg = new SpeechSynthesisUtterance(word.toLowerCase());
                    msg.rate = 0.7;
                    msg.onend = () => {
                        stars += 2;
                        document.getElementById('star-count').innerText = stars;
                        setTimeout(() => {
                            slider.value = 0;
                            chars.forEach((_, i) => document.getElementById(`char-${word}-${i}`).className = '');
                            dot.style.display = 'none';
                        }, 1000);
                    };
                }
                msg.voice = getBestVoice();
                window.speechSynthesis.speak(msg);
            } else { dot.style.display = 'none'; }
        }

        window.onload = () => loadLevel('l1', document.querySelector('.level-btn'));
        window.speechSynthesis.onvoiceschanged = getBestVoice;
    </script>
</body>
</html>
