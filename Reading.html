<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Adventure: Levels</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            background: #f0f9ff;
            text-align: center;
            padding: 20px;
            color: #333;
        }

        /* Level Navigation */
        .nav-container {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .level-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: white;
            border: 3px solid #ddd;
            transition: 0.3s;
        }

        .level-btn.active {
            background: #ff4757;
            color: white;
            border-color: #ff4757;
            box-shadow: 0 5px 15px rgba(255, 71, 87, 0.4);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border: 5px solid #1e90ff;
            border-radius: 25px;
            padding: 25px 10px;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }

        .card:hover { transform: scale(1.05); }

        .letter-hint {
            font-size: 1.5rem;
            color: #1e90ff;
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .word {
            font-size: 2.5rem;
            display: block;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .hidden-word { visibility: hidden; }
        .card.active .hidden-word { visibility: visible; }

        .star-score {
            font-size: 2rem;
            margin-top: 30px;
            color: #ffa502;
        }
    </style>
</head>
<body>

    <h1 style="color: #2ed573; font-size: 3rem;">Reading Stars ⭐</h1>
    
    <div class="nav-container">
        <button class="level-btn active" onclick="loadLevel(1, this)">Level 1 (3 Letters)</button>
        <button class="level-btn" onclick="loadLevel(2, this)">Level 2 (4 Letters)</button>
        <button class="level-btn" onclick="loadLevel(3, this)">Level 3 (5 Letters)</button>
    </div>

    <div id="game-grid" class="grid">
        </div>

    <div class="star-score">Stars: <span id="star-count">0</span> ⭐</div>

    <script>
        const levels = {
            1: [
                { word: "CAT", hint: "C" }, { word: "DOG", hint: "D" },
                { word: "SUN", hint: "S" }, { word: "BED", hint: "B" },
                { word: "PIG", hint: "P" }, { word: "HAT", hint: "H" }
            ],
            2: [
                { word: "FISH", hint: "F" }, { word: "FROG", hint: "F" },
                { word: "BIRD", hint: "B" }, { word: "STAR", hint: "S" },
                { word: "DUCK", hint: "D" }, { word: "CAKE", hint: "C" }
            ],
            3: [
                { word: "TRUCK", hint: "T" }, { word: "APPLE", hint: "A" },
                { word: "GRAPE", hint: "G" }, { word: "HOUSE", hint: "H" },
                { word: "SNAKE", hint: "S" }, { word: "PLANE", hint: "P" }
            ]
        };

        let stars = 0;

        function loadLevel(levelNum, btn) {
            // Update buttons
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const grid = document.getElementById('game-grid');
            grid.innerHTML = ''; // Clear current cards

            levels[levelNum].forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <span class="letter-hint">${item.hint}</span>
                    <span class="word hidden-word">${item.word}</span>
                `;
                card.onclick = () => speakWord(item.word, card);
                grid.appendChild(card);
            });
        }

        function speakWord(word, element) {
            window.speechSynthesis.cancel();
            
            const msg = new SpeechSynthesisUtterance();
            
            // Phonetic spelling: speaks the word slowly
            msg.text = word;
            msg.rate = 0.6; 
            msg.pitch = 1.2;

            // Voice Selection
            const voices = window.speechSynthesis.getVoices();
            msg.voice = voices.find(v => v.name.includes('Google') || v.name.includes('Natural')) || voices[0];

            element.classList.add('active');
            
            msg.onend = () => {
                // Give a star if this is the first time clicking it (optional logic)
                stars++;
                document.getElementById('star-count').innerText = stars;
                
                setTimeout(() => {
                    element.classList.remove('active');
                }, 1500);
            };

            window.speechSynthesis.speak(msg);
        }

        // Initialize Level 1 on load
        window.onload = () => {
            loadLevel(1, document.querySelector('.level-btn'));
        };

        // Warm up voices
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    </script>
</body>
</html>
