<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Adventure: Levels</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            background: #f0f9ff;
            text-align: center;
            padding: 20px;
            color: #333;
        }

        h1 { color: #ff4757; font-size: 3rem; text-shadow: 2px 2px white; }

        /* Level Navigation */
        .nav-container {
            margin-bottom: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .level-btn {
            padding: 12px 25px;
            font-size: 1.1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            background: white;
            border: 3px solid #1e90ff;
            color: #1e90ff;
            font-weight: bold;
            transition: 0.3s;
        }

        .level-btn.active {
            background: #1e90ff;
            color: white;
            box-shadow: 0 5px 15px rgba(30, 144, 255, 0.4);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border: 5px solid #2ed573;
            border-radius: 25px;
            padding: 30px 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            position: relative;
        }

        .card:hover { transform: translateY(-5px); border-color: #ffa502; }

        .letter-hint {
            font-size: 4rem;
            color: #2f3542;
            display: block;
            font-weight: bold;
        }

        .word {
            font-size: 1.8rem;
            color: #ff4757;
            font-weight: bold;
            display: block;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .card.active .word { opacity: 1; }
        .card.active .letter-hint { color: #ccc; }

        .star-score {
            font-size: 2rem;
            margin-top: 40px;
            color: #ffa502;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>Reading Adventure ⭐</h1>
    
    <div class="nav-container">
        <button class="level-btn active" onclick="loadLevel(1, this)">Level 1 (3 Letters)</button>
        <button class="level-btn" onclick="loadLevel(2, this)">Level 2 (4 Letters)</button>
        <button class="level-btn" onclick="loadLevel(3, this)">Level 3 (5 Letters)</button>
    </div>

    <div id="game-grid" class="grid"></div>

    <div class="star-score">Stars: <span id="star-count">0</span> 🌟</div>

    <script>
        const levels = {
            1: [
                { word: "CAT", letter: "C" }, { word: "DOG", letter: "D" },
                { word: "SUN", letter: "S" }, { word: "BED", letter: "B" },
                { word: "PIG", letter: "P" }, { word: "HAT", letter: "H" }
            ],
            2: [
                { word: "FISH", letter: "F" }, { word: "FROG", letter: "F" },
                { word: "BIRD", letter: "B" }, { word: "STAR", letter: "S" },
                { word: "DUCK", letter: "D" }, { word: "CAKE", letter: "C" }
            ],
            3: [
                { word: "TRUCK", letter: "T" }, { word: "APPLE", letter: "A" },
                { word: "GRAPE", letter: "G" }, { word: "HOUSE", letter: "H" },
                { word: "SNAKE", letter: "S" }, { word: "PLANE", letter: "P" }
            ]
        };

        let stars = 0;

        function loadLevel(levelNum, btn) {
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const grid = document.getElementById('game-grid');
            grid.innerHTML = ''; 

            levels[levelNum].forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <span class="letter-hint">${item.letter}</span>
                    <span class="word">${item.word}</span>
                `;
                card.onclick = () => speakSequenced(item.letter, item.word, card);
                grid.appendChild(card);
            });
        }

        function speakSequenced(letter, word, element) {
            window.speechSynthesis.cancel();
            
            const msg = new SpeechSynthesisUtterance();
            
            // The "Better Voice" Logic: Letter + Pause + Word
            msg.text = `${letter}. ... ... ${word}`;
            
            msg.rate = 0.7;  // Slow and clear
            msg.pitch = 1.2; // Cheerful pitch
            
            // Voice selection
            const voices = window.speechSynthesis.getVoices();
            const bestVoice = voices.find(v => v.name.includes('Google US English')) || 
                              voices.find(v => v.name.includes('Natural')) ||
                              voices[0];
            if (bestVoice) msg.voice = bestVoice;

            element.classList.add('active');
            
            msg.onend = () => {
                stars++;
                document.getElementById('star-count').innerText = stars;
                setTimeout(() => {
                    element.classList.remove('active');
                }, 1000);
            };

            window.speechSynthesis.speak(msg);
        }

        window.onload = () => {
            loadLevel(1, document.querySelector('.level-btn'));
        };

        // Pre-load voices for the browser
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    </script>
</body>
</html>
