<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Adventure Pro</title>
    <style>
        /* Premium UX Styling */
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            text-align: center;
            padding: 40px 20px;
            color: #2f3542;
            min-height: 100vh;
        }

        h1 { color: #ff4757; font-size: 3.5rem; margin-bottom: 10px; text-shadow: 2px 2px #fff; }
        
        .nav-container {
            margin: 30px auto;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            max-width: 800px;
        }

        .level-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            border: 4px solid #1e90ff;
            border-radius: 50px;
            cursor: pointer;
            background: white;
            color: #1e90ff;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .level-btn.active {
            background: #1e90ff;
            color: white;
            transform: scale(1.1);
            box-shadow: 0 8px 20px rgba(30, 144, 255, 0.4);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 25px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border: 6px solid #1e90ff;
            border-radius: 30px;
            padding: 35px 15px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-10px);
            border-color: #ffa502;
        }

        .letter-hint {
            font-size: 5rem;
            display: block;
            font-weight: bold;
            color: #2f3542;
            transition: color 0.3s;
        }

        .word {
            font-size: 2rem;
            color: #2ed573;
            font-weight: bold;
            display: block;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
        }

        .card.active { border-color: #2ed573; background-color: #f0fff4; }
        .card.active .word { opacity: 1; transform: translateY(0); }
        .card.active .letter-hint { color: #ced6e0; }

        /* The Pulse Animation */
        .speaking-ring {
            display: none;
            position: absolute;
            top: 15px;
            right: 15px;
            width: 25px;
            height: 25px;
            background-color: #ff4757;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .star-score {
            font-size: 2.2rem;
            margin-top: 50px;
            color: #ffa502;
            text-shadow: 1px 1px white;
        }
    </style>
</head>
<body>

    <h1>Reading Adventure 🍎</h1>
    <p style="font-size: 1.2rem;">Choose a level and tap the letters!</p>
    
    <div class="nav-container">
        <button class="level-btn active" onclick="loadLevel(1, this)">Level 1 (3 Letters)</button>
        <button class="level-btn" onclick="loadLevel(2, this)">Level 2 (4 Letters)</button>
        <button class="level-btn" onclick="loadLevel(3, this)">Level 3 (5 Letters)</button>
    </div>

    <div id="game-grid" class="grid"></div>

    <div class="star-score">Stars: <span id="star-count">0</span> ⭐</div>

    <script>
        const levels = {
            1: [
                { word: "CAT", letter: "C" }, { word: "DOG", letter: "D" },
                { word: "SUN", letter: "S" }, { word: "BED", letter: "B" },
                { word: "PIG", letter: "P" }, { word: "HAT", letter: "H" }
            ],
            2: [
                { word: "FISH", letter: "F" }, { word: "FROG", letter: "F" },
                { word: "BIRD", letter: "B" }, { word: "STAR", letter: "S" },
                { word: "DUCK", letter: "D" }, { word: "CAKE", letter: "C" }
            ],
            3: [
                { word: "TRUCK", letter: "T" }, { word: "APPLE", letter: "A" },
                { word: "GRAPE", letter: "G" }, { word: "HOUSE", letter: "H" },
                { word: "SNAKE", letter: "S" }, { word: "PLANE", letter: "P" }
            ]
        };

        let stars = 0;

        function loadLevel(levelNum, btn) {
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const grid = document.getElementById('game-grid');
            grid.innerHTML = ''; 

            levels[levelNum].forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="speaking-ring"></div>
                    <span class="letter-hint">${item.letter}</span>
                    <span class="word">${item.word}</span>
                `;
                card.onclick = () => speakSequenced(item.letter, item.word, card);
                grid.appendChild(card);
            });
        }

        function speakSequenced(letter, word, element) {
            window.speechSynthesis.cancel();
            
            const msg = new SpeechSynthesisUtterance();
            msg.text = `${letter}. ... ... ${word}`;
            msg.rate = 0.7; 
            msg.pitch = 1.2;
            
            const voices = window.speechSynthesis.getVoices();
            const bestVoice = voices.find(v => v.name.includes('Google US English')) || 
                              voices.find(v => v.name.includes('Natural')) ||
                              voices[0];
            if (bestVoice) msg.voice = bestVoice;

            // UX Feedback
            element.classList.add('active');
            const ring = element.querySelector('.speaking-ring');
            ring.style.display = 'block';

            msg.onend = () => {
                stars++;
                document.getElementById('star-count').innerText = stars;
                ring.style.display = 'none';
                setTimeout(() => element.classList.remove('active'), 1000);
            };

            window.speechSynthesis.speak(msg);
        }

        window.onload = () => loadLevel(1, document.querySelector('.level-btn'));
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    </script>
</body>
</html>
