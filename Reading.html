<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Stars Adventure</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            text-align: center;
            padding: 20px;
            color: #2f3542;
            min-height: 100vh;
            margin: 0;
        }

        h1 { color: #ff4757; font-size: 2.8rem; margin: 10px 0; text-shadow: 2px 2px #fff; }
        
        .nav-container {
            margin: 20px auto;
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            max-width: 1100px;
        }

        .level-btn {
            padding: 10px 16px;
            font-size: 0.9rem;
            border: 3px solid #1e90ff;
            border-radius: 50px;
            cursor: pointer;
            background: white;
            color: #1e90ff;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .level-btn.active {
            background: #1e90ff;
            color: white;
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(30, 144, 255, 0.4);
        }

        .level-btn.red-mode.active { background: #ff4757; border-color: #ff4757; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 20px 120px 20px;
        }

        .card {
            background: white;
            border: 5px solid #1e90ff;
            border-radius: 25px;
            padding: 30px 10px;
            cursor: pointer;
            position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 160px;
        }

        .card:hover {
            transform: translateY(-12px) rotate(-3deg);
            border-color: #ffa502;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
        }

        .letter-hint { font-size: 4.5rem; display: block; font-weight: bold; color: #2f3542; }
        .word-hint { font-size: 2rem; display: block; font-weight: bold; color: #2f3542; word-wrap: break-word; }
        .word-label { font-size: 1.5rem; color: #2ed573; font-weight: bold; display: block; opacity: 0; transition: 0.3s; margin-top: 5px; }

        .card.red-word { border-color: #ff4757; }
        .card.red-word .word-label { color: #ff4757; }

        .card.active { border-color: #2ed573; background-color: #f0fff4; transform: scale(1.05) rotate(0deg) !important; }
        .card.active .word-label { opacity: 1; }
        .card.active .letter-hint, .card.active .word-hint { color: #ced6e0; }

        .speaking-ring {
            display: none;
            position: absolute;
            top: 15px;
            right: 15px;
            width: 20px;
            height: 20px;
            background-color: #ff4757;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }

        .footer-score {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            padding: 15px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.08);
            font-size: 2rem;
            color: #ffa502;
            font-weight: bold;
            z-index: 100;
        }
    </style>
</head>
<body>

    <h1>Reading Stars ⭐</h1>
    
    <div class="nav-container">
        <button class="level-btn active" onclick="loadLevel('l1', this)">L1: 3 Letters</button>
        <button class="level-btn" onclick="loadLevel('l2', this)">L2: 4 Letters</button>
        <button class="level-btn" onclick="loadLevel('l3', this)">L3: 5 Letters</button>
        <button class="level-btn" onclick="loadLevel('l4', this)">L4: Mix Words</button>
        <button class="level-btn" onclick="loadLevel('l5', this)">L5: Long Words</button>
        <button class="level-btn" onclick="loadLevel('l6', this)">L6: Sentences</button>
        <button class="level-btn red-mode" onclick="loadLevel('red', this)">Red Words</button>
    </div>

    <div id="game-grid" class="grid"></div>
    <div class="footer-score">Stars: <span id="star-count">0</span> 🌟</div>

    <script>
        const wordData = {
            l1: [
                {w:"CAT", l:"C"}, {w:"DOG", l:"D"}, {w:"SUN", l:"S"}, {w:"PIG", l:"P"}, {w:"HAT", l:"H"},
                {w:"BOX", l:"B"}, {w:"JAM", l:"J"}, {w:"MOP", l:"M"}, {w:"BED", l:"B"}, {w:"CUP", l:"C"},
                {w:"JET", l:"J"}, {w:"NET", l:"N"}, {w:"PEN", l:"P"}, {w:"VAN", l:"V"}, {w:"WIG", l:"W"}
            ],
            l2: [
                {w:"FISH", l:"F"}, {w:"STAR", l:"S"}, {w:"FROG", l:"F"}, {w:"BIRD", l:"B"}, {w:"DUCK", l:"D"},
                {w:"CAKE", l:"C"}, {w:"TREE", l:"T"}, {w:"MOON", l:"M"}, {w:"BOAT", l:"B"}, {w:"LAMP", l:"L"},
                {w:"HAND", l:"H"}, {w:"DRUM", l:"D"}, {w:"KITE", l:"K"}, {w:"MILK", l:"M"}, {w:"WIND", l:"W"}
            ],
            l3: [
                {w:"TRUCK", l:"T"}, {w:"APPLE", l:"A"}, {w:"GRAPE", l:"G"}, {w:"HOUSE", l:"H"}, {w:"SNAKE", l:"S"},
                {w:"PLANE", l:"P"}, {w:"CLOCK", l:"C"}, {w:"BREAD", l:"B"}, {w:"TRAIN", l:"T"}, {w:"SPOON", l:"S"},
                {w:"DRESS", l:"D"}, {w:"HEART", l:"H"}, {w:"PHONE", l:"P"}, {w:"WATER", l:"W"}, {w:"SHIRT", l:"S"}
            ],
            l4: [
                {w:"BRUSH", m:"word"}, {w:"SMILE", m:"word"}, {w:"PLANT", m:"word"}, {w:"STAMP", m:"word"},
                {w:"SWIM", m:"word"}, {w:"GLASS", m:"word"}, {w:"TRASH", m:"word"}, {w:"CRAB", m:"word"},
                {w:"FLIP", m:"word"}, {w:"DRIP", m:"word"}, {w:"SKIP", m:"word"}, {w:"FROG", m:"word"}
            ],
            l5: [
                {w:"GIRAFFE", m:"word"}, {w:"ELEPHANT", m:"word"}, {w:"RAINBOW", m:"word"}, {w:"OCTOPUS", m:"word"},
                {w:"CHICKEN", m:"word"}, {w:"FLOWER", m:"word"}, {w:"DINOSAUR", m:"word"}, {w:"BUTTERFLY", m:"word"},
                {w:"HAMBURGER", m:"word"}, {w:"UMBRELLA", m:"word"}, {w:"COMPUTER", m:"word"}
            ],
            l6: [
                {w:"I LIKE DOGS", m:"word"}, {w:"THE BIG SUN", m:"word"}, {w:"A RED CAT", m:"word"},
                {w:"SEE THE FISH", m:"word"}, {w:"GO TO BED", m:"word"}, {w:"MY FAST JEEP", m:"word"},
                {w:"I CAN READ", m:"word"}, {w:"THE BLUE SKY", m:"word"}, {w:"A PINK PIG", m:"word"}
            ],
            red: [
                {w:"THE", l:"T"}, {w:"SAID", l:"S"}, {w:"WAS", l:"W"}, {w:"ARE", l:"A"}, {w:"YOU", l:"Y"},
                {w:"THEY", l:"T"}, {w:"FROM", l:"F"}, {w:"DOES", l:"D"}, {w:"WHAT", l:"W"}, {w:"WANT", l:"W"},
                {w:"GIVE", l:"G"}, {w:"SOME", l:"S"}, {w:"BECAUSE", l:"B"}, {w:"COULD", l:"C"}, {w:"YOUR", l:"Y"}
            ]
        };

        let stars = 0;

        function loadLevel(levelId, btn) {
            window.speechSynthesis.cancel();
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const grid = document.getElementById('game-grid');
            grid.innerHTML = ''; 

            wordData[levelId].forEach(item => {
                const isWordMode = item.m === "word";
                const card = document.createElement('div');
                card.className = 'card' + (levelId === 'red' ? ' red-word' : '');
                
                card.innerHTML = `
                    <div class="speaking-ring"></div>
                    <span class="${isWordMode ? 'word-hint' : 'letter-hint'}">${isWordMode ? item.w : item.l}</span>
                    <span class="word-label">${isWordMode ? 'Good!' : item.w}</span>
                `;
                
                card.onclick = () => {
                    if(isWordMode) speakFullWord(item.w, card);
                    else speakSequenced(item.l, item.w, card);
                };
                grid.appendChild(card);
            });
        }

        function speakSequenced(letter, word, element) {
            window.speechSynthesis.cancel();
            resetUI();
            const msg = new SpeechSynthesisUtterance(`${letter}. ... ... ${word}`);
            setupVoice(msg, 0.8);
            attachEvents(msg, element);
            window.speechSynthesis.speak(msg);
        }

        function speakFullWord(word, element) {
            window.speechSynthesis.cancel();
            resetUI();
            const msg = new SpeechSynthesisUtterance(`${word}. ... ... ${word}`);
            setupVoice(msg, 0.75);
            attachEvents(msg, element);
            window.speechSynthesis.speak(msg);
        }

        function resetUI() {
            document.querySelectorAll('.card').forEach(c => {
                c.classList.remove('active');
                c.querySelector('.speaking-ring').style.display = 'none';
            });
        }

        function setupVoice(msg, rate) {
            msg.rate = rate;
            msg.pitch = 1.05;
            const voices = window.speechSynthesis.getVoices();
            msg.voice = voices.find(v => v.name.includes('Google US English')) || voices.find(v => v.name.includes('Natural')) || voices[0];
        }

        function attachEvents(msg, element) {
            element.classList.add('active');
            const ring = element.querySelector('.speaking-ring');
            ring.style.display = 'block';
            msg.onend = () => {
                stars++;
                document.getElementById('star-count').innerText = stars;
                ring.style.display = 'none';
                setTimeout(() => { if (element.classList.contains('active')) element.classList.remove('active'); }, 1200);
            };
        }

        window.onload = () => loadLevel('l1', document.querySelector('.level-btn'));
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
    </script>
</body>
</html>
