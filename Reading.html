<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Stars Adventure</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            text-align: center;
            padding: 20px;
            color: #2f3542;
            min-height: 100vh;
            margin: 0;
        }

        h1 { color: #ff4757; font-size: 2.8rem; margin: 10px 0; text-shadow: 2px 2px #fff; }
        
        .nav-container {
            margin: 20px auto;
            display: flex;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            max-width: 1100px;
        }

        .level-btn {
            padding: 10px 16px;
            font-size: 0.85rem;
            border: 3px solid #1e90ff;
            border-radius: 50px;
            cursor: pointer;
            background: white;
            color: #1e90ff;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .level-btn.active { background: #1e90ff; color: white; transform: scale(1.05); }
        .level-btn.blend-mode.active { background: #ffa502; border-color: #ffa502; }
        .level-btn.red-mode.active { background: #ff4757; border-color: #ff4757; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 20px 120px 20px;
        }

        .card {
            background: white;
            border: 5px solid #1e90ff;
            border-radius: 25px;
            padding: 20px;
            position: relative;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 200px;
        }

        /* Blending Specific Styles */
        .blend-display {
            font-size: 4rem;
            letter-spacing: 15px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .char-active { color: #ffa502; transform: scale(1.2); display: inline-block; }

        .slider-container {
            width: 90%;
            margin-top: 15px;
        }

        input[type=range] {
            width: 100%;
            cursor: pointer;
        }

        .footer-score {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: white;
            padding: 15px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.08);
            font-size: 2rem;
            color: #ffa502;
            font-weight: bold;
            z-index: 100;
        }

        .letter-header { font-size: 2.5rem; color: #1e90ff; font-weight: bold; }
        .target-word { font-weight: bold; color: #2f3542; }
        .card.red-word { border-color: #ff4757; }
    </style>
</head>
<body>

    <h1>Reading Stars ⭐</h1>
    
    <div class="nav-container">
        <button class="level-btn active" onclick="loadLevel('l1', this)">L1: A-Z (3)</button>
        <button class="level-btn" onclick="loadLevel('l4', this)">L4: Blends</button>
        <button class="level-btn" onclick="loadLevel('l6', this)">L6: Sentences</button>
        <button class="level-btn red-mode" onclick="loadLevel('red', this)">Red Words</button>
        <button class="level-btn blend-mode" onclick="loadLevel('blend', this)">🌟 Blending</button>
    </div>

    <div id="game-grid" class="grid"></div>
    <div class="footer-score">Stars: <span id="star-count">0</span> 🌟</div>

    <script>
        const wordData = {
            l1: [{w:"ANT", l:"A"}, {w:"BAT", l:"B"}, {w:"CAT", l:"C"}, {w:"DOG", l:"D"}, {w:"SUN", l:"S"}, {w:"TEN", l:"T"}, {w:"BOX", l:"X"}],
            l4: [{w:"BLAST", l:"B"}, {w:"CRISP", l:"C"}, {w:"FROST", l:"F"}, {w:"PLANT", l:"P"}],
            l6: [{w:"I LIKE CATS", l:"-"}, {w:"SEE THE DOG", l:"-"}, {w:"YOU ARE A STAR", l:"-"}],
            red: [{w:"THE", l:"T"}, {w:"SAID", l:"S"}, {w:"WAS", l:"W"}, {w:"ARE", l:"A"}, {w:"YOU", l:"Y"}],
            blend: [{w:"CAT"}, {w:"DOG"}, {w:"SUN"}, {w:"MAP"}, {w:"TEN"}, {w:"PIG"}, {w:"FOX"}]
        };

        let stars = 0;
        let currentStep = -1;

        function loadLevel(levelId, btn) {
            window.speechSynthesis.cancel();
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const grid = document.getElementById('game-grid');
            grid.innerHTML = ''; 

            wordData[levelId].forEach(item => {
                const card = document.createElement('div');
                card.className = 'card' + (levelId === 'red' ? ' red-word' : '');

                if(levelId === 'blend') {
                    createBlendCard(card, item.w);
                } else {
                    const letterPair = (item.l === "-") ? "" : `${item.l}${item.l.toLowerCase()}`;
                    card.innerHTML = `
                        <span class="letter-header">${letterPair}</span>
                        <span class="target-word" style="font-size: 2rem">${item.w}</span>
                    `;
                    card.onclick = () => speakBasic(item.l, item.w, card);
                }
                grid.appendChild(card);
            });
        }

        function createBlendCard(card, word) {
            const chars = word.split('');
            let wordHtml = `<div class="blend-display" id="display-${word}">`;
            chars.forEach((c, i) => {
                wordHtml += `<span id="char-${word}-${i}">${c}</span>`;
            });
            wordHtml += `</div>`;

            card.innerHTML = `
                ${wordHtml}
                <div class="slider-container">
                    <input type="range" min="0" max="${chars.length}" value="0" 
                        oninput="handleBlend(this, '${word}')" 
                        onchange="finishBlend(this, '${word}')">
                </div>
                <p style="color:#aaa; font-size:0.8rem">Slide to sound it out!</p>
            `;
        }

        function handleBlend(slider, word) {
            window.speechSynthesis.cancel();
            const val = parseInt(slider.value);
            const chars = word.split('');
            
            // Reset colors
            chars.forEach((_, i) => {
                document.getElementById(`char-${word}-${i}`).className = '';
            });

            if (val > 0 && val <= chars.length) {
                const index = val - 1;
                const char = chars[index];
                document.getElementById(`char-${word}-${index}`).className = 'char-active';
                
                // Speak individual letter sound (Phoneme)
                const msg = new SpeechSynthesisUtterance(char);
                msg.rate = 1.2;
                window.speechSynthesis.speak(msg);
            }
        }

        function finishBlend(slider, word) {
            if (parseInt(slider.value) === word.length) {
                const msg = new SpeechSynthesisUtterance(word);
                msg.rate = 0.8;
                msg.onend = () => {
                    stars += 2; // Extra stars for blending!
                    document.getElementById('star-count').innerText = stars;
                    setTimeout(() => { slider.value = 0; handleBlend(slider, word); }, 1000);
                };
                window.speechSynthesis.speak(msg);
            }
        }

        function speakBasic(letter, word, element) {
            window.speechSynthesis.cancel();
            const phrase = (letter === "-") ? word : `${letter}. ... ${word}`;
            const msg = new SpeechSynthesisUtterance(phrase);
            msg.onend = () => {
                stars++;
                document.getElementById('star-count').innerText = stars;
            };
            window.speechSynthesis.speak(msg);
        }

        window.onload = () => loadLevel('l1', document.querySelector('.level-btn'));
    </script>
</body>
</html>
