<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading Stars Adventure</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            text-align: center;
            padding: 20px;
            color: #2f3542;
            min-height: 100vh;
            margin: 0;
        }

        h1 { color: #ff4757; font-size: 2.8rem; margin: 10px 0; text-shadow: 2px 2px #fff; }
        
        .nav-container {
            margin: 20px auto;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            max-width: 1100px;
        }

        .level-btn {
            padding: 12px 20px;
            font-size: 1rem;
            border: 3px solid #1e90ff;
            border-radius: 50px;
            cursor: pointer;
            background: white;
            color: #1e90ff;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        .level-btn:hover { transform: scale(1.1); background: #f1f9ff; }
        .level-btn.active { background: #1e90ff; color: white; box-shadow: 0 5px 15px rgba(30,144,255,0.4); }
        .level-btn.red-mode.active { background: #ff4757; border-color: #ff4757; }
        .level-btn.blend-mode.active { background: #ffa502; border-color: #ffa502; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); 
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px 20px 140px 20px;
        }

        .card {
            background: white;
            border: 5px solid #1e90ff;
            border-radius: 25px;
            padding: 20px;
            cursor: pointer;
            position: relative;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s, border-color 0.3s;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 220px;
        }

        .card:hover {
            transform: translateY(-12px) rotate(3deg);
            border-color: #ffa502;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
        }

        .card.active { border-color: #2ed573; background-color: #f0fff4; transform: scale(1.05); }

        .speaking-dot {
            display: none;
            position: absolute;
            top: 15px;
            right: 15px;
            width: 22px;
            height: 22px;
            background-color: #ff4757;
            border-radius: 50%;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .letter-header { font-size: 3.5rem; color: #1e90ff; font-weight: bold; margin-bottom: 5px; }
        .target-word { font-weight: bold; color: #2f3542; font-size: 2.4rem; }
        
        .card.red-word { border-color: #ff4757; }
        .card.red-word .letter-header { color: #ff4757; }

        .blend-display { font-size: 4rem; letter-spacing: 15px; margin-bottom: 20px; font-weight: bold; }
        .char-active { color: #ffa502; transform: scale(1.25); display: inline-block; }

        .slider-container { width: 90%; margin-top: 15px; }
        input[type=range] { width: 100%; cursor: pointer; height: 25px; }

        .footer-score {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: white; padding: 15px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.08);
            font-size: 2.2rem; color: #ffa502; font-weight: bold; z-index: 100;
        }
    </style>
</head>
<body>

    <h1>Reading Stars ⭐</h1>
    
    <div class="nav-container">
        <button class="level-btn active" onclick="loadLevel('l1', this)">L1</button>
        <button class="level-btn" onclick="loadLevel('l2', this)">L2</button>
        <button class="level-btn" onclick="loadLevel('l3', this)">L3</button>
        <button class="level-btn" onclick="loadLevel('l4', this)">L4</button>
        <button class="level-btn" onclick="loadLevel('l5', this)">L5</button>
        <button class="level-btn" onclick="loadLevel('l6', this)">L6</button>
        <button class="level-btn red-mode" onclick="loadLevel('red', this)">Red Words</button>
        <button class="level-btn blend-mode" onclick="loadLevel('blend', this)">🌟 Blending</button>
    </div>

    <div id="game-grid" class="grid"></div>
    <div class="footer-score">Stars: <span id="star-count">0</span> 🌟</div>

    <script>
        const wordData = {
            l1: [{w:"ANT", l:"A"}, {w:"BAT", l:"B"}, {w:"CAT", l:"C"}, {w:"DOG", l:"D"}, {w:"EGG", l:"E"}, {w:"FAN", l:"F"}, {w:"GUM", l:"G"}, {w:"HAT", l:"H"}, {w:"INK", l:"I"}, {w:"JAM", l:"J"}, {w:"KIT", l:"K"}, {w:"LOG", l:"L"}, {w:"MAP", l:"M"}, {w:"NET", l:"N"}, {w:"OWL", l:"O"}, {w:"PIG", l:"P"}, {w:"QUB", l:"Q"}, {w:"RUN", l:"R"}, {w:"SUN", l:"S"}, {w:"TEN", l:"T"}, {w:"UP!", l:"U"}, {w:"VAN", l:"V"}, {w:"WIG", l:"W"}, {w:"BOX", l:"X"}, {w:"YAK", l:"Y"}, {w:"ZAP", l:"Z"}],
            l2: [{w:"ATOM", l:"A"}, {w:"BIRD", l:"B"}, {w:"CAKE", l:"C"}, {w:"DUCK", l:"D"}, {w:"EAST", l:"E"}, {w:"FISH", l:"F"}, {w:"GATE", l:"G"}, {w:"HAND", l:"H"}, {w:"IRON", l:"I"}, {w:"JEEP", l:"J"}, {w:"KITE", l:"K"}, {w:"LAMP", l:"L"}, {w:"MOON", l:"M"}, {w:"NEST", l:"N"}, {w:"OPEN", l:"O"}, {w:"PINK", l:"P"}, {w:"QUIT", l:"Q"}, {w:"RAIN", l:"R"}, {w:"STAR", l:"S"}, {w:"TREE", l:"T"}, {w:"UNIT", l:"U"}, {w:"VEST", l:"V"}, {w:"WIND", l:"W"}, {w:"EXIT", l:"X"}, {w:"YELL", l:"Y"}, {w:"ZOOM", l:"Z"}],
            l3: [{w:"APPLE", l:"A"}, {w:"BREAD", l:"B"}, {w:"CLOCK", l:"C"}, {w:"DRESS", l:"D"}, {w:"EAGLE", l:"E"}, {w:"FRUIT", l:"F"}, {w:"GRAPE", l:"G"}, {w:"HOUSE", l:"H"}, {w:"IGLOO", l:"I"}, {w:"JELLY", l:"J"}, {w:"KOALA", l:"K"}, {w:"LEMON", l:"L"}, {w:"MOUSE", l:"M"}, {w:"NIGHT", l:"N"}, {w:"OCEAN", l:"O"}, {w:"PLANE", l:"P"}, {w:"QUEEN", l:"Q"}, {w:"ROBOT", l:"R"}, {w:"SNAKE", l:"S"}, {w:"TRAIN", l:"T"}, {w:"UNCLE", l:"U"}, {w:"VOICE", l:"V"}, {w:"WATER", l:"W"}, {w:"XYLO", l:"X"}, {w:"YOUNG", l:"Y"}, {w:"ZEBRA", l:"Z"}],
            l4: [{w:"AXLE", l:"A"}, {w:"BLAST", l:"B"}, {w:"CRISP", l:"C"}, {w:"DRIFT", l:"D"}, {w:"ENTRY", l:"E"}, {w:"FROST", l:"F"}, {w:"GRUNT", l:"G"}, {w:"HATCH", l:"H"}, {w:"INDEX", l:"I"}, {w:"JOINT", l:"J"}, {w:"KNOCK", l:"K"}, {w:"LUNCH", l:"L"}, {w:"MARCH", l:"M"}, {w:"NORTH", l:"N"}, {w:"ORDER", l:"O"}, {w:"PLANT", l:"P"}, {w:"QUICK", l:"Q"}, {w:"ROAST", l:"R"}, {w:"SMILE", l:"S"}, {w:"TRUST", l:"T"}, {w:"UNDER", l:"U"}, {w:"VIVID", l:"V"}, {w:"WHALE", l:"W"}, {w:"X-RAY", l:"X"}, {w:"YOUTH", l:"Y"}, {w:"ZESTY", l:"Z"}],
            l5: [{w:"AIRPLANE", l:"A"}, {w:"BUTTERFLY", l:"B"}, {w:"COMPUTER", l:"C"}, {w:"DINOSAUR", l:"D"}, {w:"ELEPHANT", l:"E"}, {w:"FLAMINGO", l:"F"}, {w:"GIRAFFE", l:"G"}, {w:"HAMBURGER", l:"H"}, {w:"INVISIBLE", l:"I"}, {w:"JELLYFISH", l:"J"}, {w:"KANGAROO", l:"K"}, {w:"LIGHTNING", l:"L"}, {w:"MOUNTAIN", l:"M"}, {w:"NOTEBOOK", l:"N"}, {w:"OCTOPUS", l:"O"}, {w:"PENGUIN", l:"P"}, {w:"QUIETLY", l:"Q"}, {w:"RAINBOW", l:"R"}, {w:"SQUIRREL", l:"S"}, {w:"TELESCOPE", l:"T"}, {w:"UMBRELLA", l:"U"}, {w:"VEGETABLE", l:"V"}, {w:"WHEELBARROW", l:"W"}, {w:"XYLOPHONE", l:"X"}, {w:"YESTERDAY", l:"Y"}, {w:"ZOOLOGIST", l:"Z"}],
            l6: [{w:"I LIKE CATS", l:"-"}, {w:"SEE THE DOG", l:"-"}, {w:"MY BIG RED HAT", l:"-"}, {w:"GO TO THE BED", l:"-"}, {w:"A FAST BLUE JEEP", l:"-"}, {w:"CAN YOU RUN?", l:"-"}, {w:"I SEE THE SUN", l:"-"}, {w:"THE BOX IS BIG", l:"-"}, {w:"LOOK AT THE PIG", l:"-"}, {w:"WE CAN PLAY", l:"-"}, {w:"THE CAT IS ON THE MAT", l:"-"}, {w:"I LIKE TO SWIM", l:"-"}, {w:"SEE THE GREEN TREE", l:"-"}, {w:"MY MOM IS KIND", l:"-"}, {w:"THE DUCK CAN QUACK", l:"-"}, {w:"HE HAS A TOY", l:"-"}, {w:"SHE SAW THE BIRD", l:"-"}, {w:"WE WENT TO THE PARK", l:"-"}, {w:"I CAN READ WORDS", l:"-"}, {w:"YOU ARE A STAR", l:"-"}],
            red: [{w:"THE", l:"T"}, {w:"SAID", l:"S"}, {w:"WAS", l:"W"}, {w:"ARE", l:"A"}, {w:"YOU", l:"Y"}, {w:"THEY", l:"T"}, {w:"FROM", l:"F"}, {w:"DOES", l:"D"}, {w:"WHAT", l:"W"}, {w:"WANT", l:"W"}, {w:"GIVE", l:"G"}, {w:"SOME", l:"S"}, {w:"BECAUSE", l:"B"}, {w:"COULD", l:"C"}, {w:"YOUR", l:"Y"}, {w:"PEOPLE", l:"P"}, {w:"THROUGH", l:"T"}, {w:"THOUGHT", l:"T"}, {w:"LAUGH", l:"L"}, {w:"WHO", l:"W"}, {w:"WERE", l:"W"}, {w:"WHERE", l:"W"}, {w:"ONCE", l:"O"}, {w:"DOOR", l:"D"}, {w:"EYE", l:"E"}],
            blend: [
                {w:"CAT", p:["k", "ah", "t"]}, 
                {w:"DOG", p:["d", "aw", "g"]}, 
                {w:"SUN", p:["s", "uh", "n"]}, 
                {w:"MAP", p:["m", "ah", "p"]}, 
                {w:"TEN", p:["t", "eh", "n"]}, 
                {w:"PIG", p:["p", "ih", "g"]}, 
                {w:"FOX", p:["f", "aw", "ks"]}, 
                {w:"BAT", p:["b", "ah", "t"]}, 
                {w:"JAM", p:["j", "ah", "m"]}, 
                {w:"LOG", p:["l", "aw", "g"]}
            ]
        };

        let stars = 0;

        function getBestVoice() {
            const voices = window.speechSynthesis.getVoices();
            return voices.find(v => v.name.includes('Google') && v.lang.includes('en-US')) || 
                   voices.find(v => v.name.includes('Natural') && v.lang.includes('en-US')) ||
                   voices.find(v => v.lang.includes('en-US')) || 
                   voices[0];
        }

        function loadLevel(levelId, btn) {
            window.speechSynthesis.cancel();
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const grid = document.getElementById('game-grid');
            grid.innerHTML = ''; 

            wordData[levelId].forEach(item => {
                const card = document.createElement('div');
                card.className = 'card' + (levelId === 'red' ? ' red-word' : '');
                if(levelId === 'blend') {
                    createBlendCard(card, item);
                } else {
                    const isSentence = item.l === "-";
                    card.innerHTML = `<div class="speaking-dot"></div><span class="letter-header">${isSentence ? "" : item.l + item.l.toLowerCase()}</span><span class="target-word" style="font-size: ${isSentence ? '1.8rem' : '2.4rem'}">${item.w}</span>`;
                    card.onclick = () => {
                        window.speechSynthesis.cancel();
                        card.classList.add('active');
                        const dot = card.querySelector('.speaking-dot');
                        dot.style.display = 'block';
                        
                        const msg = new SpeechSynthesisUtterance(isSentence ? item.w.toLowerCase() : `${item.l.toLowerCase()}... ${item.w.toLowerCase()}`);
                        msg.voice = getBestVoice();
                        msg.rate = isSentence ? 0.8 : 0.9;
                        
                        msg.onend = () => {
                            stars++;
                            document.getElementById('star-count').innerText = stars;
                            dot.style.display = 'none';
                            card.classList.remove('active');
                        };
                        window.speechSynthesis.speak(msg);
                    };
                }
                grid.appendChild(card);
            });
        }

        function createBlendCard(card, item) {
            const word = item.w;
            const chars = word.split('');
            let wordHtml = `<div class="blend-display">`;
            chars.forEach((c, i) => wordHtml += `<span id="char-${word}-${i}">${c}</span>`);
            wordHtml += `</div>`;
            
            card.innerHTML = `
                <div class="speaking-dot"></div>
                ${wordHtml}
                <div class="slider-container">
                    <input type="range" min="0" max="${chars.length + 1}" value="0" 
                    oninput="handleBlend(this, '${word}', ${JSON.stringify(item.p)}, this.parentElement.parentElement)">
                </div>
                <p style="color:#aaa; font-size:0.8rem">Slide to sound it out!</p>`;
        }

        function handleBlend(slider, word, phonetics, card) {
            window.speechSynthesis.cancel();
            const val = parseInt(slider.value);
            const chars = word.split('');
            const dot = card.querySelector('.speaking-dot');
            
            chars.forEach((_, i) => document.getElementById(`char-${word}-${i}`).className = '');

            if (val > 0) {
                dot.style.display = 'block';
                let msg;

                if (val <= chars.length) {
                    // Step 1-3: PHONETIC SOUNDS
                    const index = val - 1;
                    document.getElementById(`char-${word}-${index}`).className = 'char-active';
                    msg = new SpeechSynthesisUtterance(phonetics[index]); // Uses "ah", "k", "t" etc.
                    msg.rate = 1.0;
                    msg.pitch = 1.2;
                } else {
                    // Final Step: FULL WORD SWEEP
                    chars.forEach((_, i) => document.getElementById(`char-${word}-${i}`).className = 'char-active');
                    msg = new SpeechSynthesisUtterance(word.toLowerCase());
                    msg.rate = 0.7;
                    msg.onend = () => {
                        stars += 2;
                        document.getElementById('star-count').innerText = stars;
                        setTimeout(() => {
                            slider.value = 0;
                            chars.forEach((_, i) => document.getElementById(`char-${word}-${i}`).className = '');
                            dot.style.display = 'none';
                        }, 1000);
                    };
                }
                
                msg.voice = getBestVoice();
                window.speechSynthesis.speak(msg);
            } else {
                dot.style.display = 'none';
            }
        }

        window.onload = () => loadLevel('l1', document.querySelector('.level-btn'));
        window.speechSynthesis.onvoiceschanged = getBestVoice;
    </script>
</body>
</html>
